name: 'hostwithquantum/setup-quantum-cli'
description: 'Setup the quantum-cli on GitHub Actions'
branding:
  icon: 'zap'
  color: 'red'
inputs:
  username:
    required: false
    description: Your Quantum username (required if not using api-key)
  password:
    required: false
    description: Your Quantum password (required if not using api-key)
  api-key:
    required: false
    description: Your Quantum API key (alternative to username/password)
runs:
  using: "composite"
  steps:
  - name: validate inputs
    run: |
      HAS_USERNAME="${{ inputs.username != '' }}"
      HAS_PASSWORD="${{ inputs.password != '' }}"
      HAS_API_KEY="${{ inputs.api-key != '' }}"

      if [ "$HAS_API_KEY" = "true" ]; then
        if [ "$HAS_USERNAME" = "true" ] || [ "$HAS_PASSWORD" = "true" ]; then
          echo "::error title=Invalid inputs::Cannot use api-key together with username/password. Use either api-key OR username+password."
          exit 1
        fi
      else
        if [ "$HAS_USERNAME" != "true" ] || [ "$HAS_PASSWORD" != "true" ]; then
          echo "::error title=Missing credentials::Must provide either api-key OR both username and password."
          exit 1
        fi
      fi
    shell: bash
  - name: deprecation warning (username/password)
    if: inputs.api-key == ''
    run: echo "::warning title=Deprecated::username/password authentication is deprecated. Please migrate to api-key."
    shell: bash
  - name: install quantum-cli (Linux)
    if: runner.os == 'Linux'
    run: |
      if [ "${{ runner.arch }}" = "ARM64" ]; then
        ARCH="arm64"
      else
        ARCH="amd64"
      fi
      curl \
        -H 'Cache-Control: no-cache' \
        "https://cli.planetary-quantum.com/quantum-cli-linux-${ARCH}?v=$RANDOM" \
        -o ${{ github.action_path }}/quantum-cli \
        && chmod +x ${{ github.action_path }}/quantum-cli
    shell: bash
  - name: install quantum-cli (macOS)
    if: runner.os == 'macOS'
    run: |
      if [ "${{ runner.arch }}" = "ARM64" ]; then
        ARCH="arm64"
      else
        ARCH="amd64"
      fi
      curl \
        -H 'Cache-Control: no-cache' \
        "https://cli.planetary-quantum.com/quantum-cli-darwin-${ARCH}?v=$RANDOM" \
        -o ${{ github.action_path }}/quantum-cli \
        && chmod +x ${{ github.action_path }}/quantum-cli
    shell: bash
  - name: install quantum-cli (Windows)
    if: runner.os == 'Windows'
    run: |
      if ("${{ runner.arch }}" -eq "ARM64") {
        $arch = "arm64"
      } else {
        $arch = "amd64"
      }
      $url = "https://cli.planetary-quantum.com/quantum-cli-windows-${arch}.exe?v=$(Get-Random)"
      Invoke-WebRequest -Uri $url -OutFile "${{ github.action_path }}\quantum-cli.exe"
    shell: pwsh
  - name: add to PATH (Linux/macOS)
    if: runner.os != 'Windows'
    run: echo "${{ github.action_path }}" >> $GITHUB_PATH
    shell: bash
  - name: add to PATH (Windows)
    if: runner.os == 'Windows'
    run: echo "${{ github.action_path }}" | Out-File -FilePath $env:GITHUB_PATH -Append
    shell: pwsh
  - name: verify installation (Linux/macOS)
    if: runner.os != 'Windows'
    run: quantum-cli -v
    shell: bash
  - name: verify installation (Windows)
    if: runner.os == 'Windows'
    run: quantum-cli.exe -v
    shell: pwsh
  - name: set credentials (username/password)
    if: inputs.api-key == ''
    run: |
      echo "QUANTUM_USER=${{ inputs.username }}" >> "$GITHUB_ENV"
      echo "QUANTUM_PASSWORD=${{ inputs.password }}" >> "$GITHUB_ENV"
    shell: bash
  - name: set credentials (api-key)
    if: inputs.api-key != ''
    run: echo "QUANTUM_API_KEY=${{ inputs.api-key }}" >> "$GITHUB_ENV"
    shell: bash
