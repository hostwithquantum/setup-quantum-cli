name: 'hostwithquantum/setup-quantum-cli'
description: 'Setup the quantum-cli on GitHub Actions'
branding:
  icon: 'zap'
  color: 'red'
inputs:
  api-key:
    required: false
    description: Your Quantum API key (alternative to username/password)
  version:
    required: false
    description: Optional version to install
  enable-cache:
    required: false
    default: 'true'
    description: Enable caching of quantum-cli endpoint data between runs
  download-url:
    required: false
    default: https://cli-v3.planetary-quantum.com
    description: Optional download URL
runs:
  using: "composite"
  steps:

  - name: resolve version
    env:
      DOWNLOAD_URL: ${{ inputs.download-url }}
      INPUTS_VERSION: ${{ inputs.version }}
    id: get_version
    run: |
      if [ -n "${INPUTS_VERSION}" ]; then
        echo "cli-version=${INPUTS_VERSION}" >> $GITHUB_OUTPUT
      else
        LATEST=$(curl -s "${DOWNLOAD_URL}/latest.txt")
        echo "cli-version=$LATEST" >> $GITHUB_OUTPUT
      fi
    shell: bash

  - run: echo "Installing ${STEPS_GET_VERSION_OUTPUTS_CLI_VERSION}" >> $GITHUB_STEP_SUMMARY
    shell: bash
    env:
      STEPS_GET_VERSION_OUTPUTS_CLI_VERSION: ${{ steps.get_version.outputs.cli-version }}

  - name: resolve binary
    env:
      RUNNER_OS: ${{ runner.os }}
    id: cli
    run: |
      if [ "${{ runner.arch }}" = "ARM64" ]; then
        ARCH="arm64"
      else
        ARCH="amd64"
      fi
      case "${RUNNER_OS}" in
        Linux)  echo "bin=quantum-cli-linux-${ARCH}" >> $GITHUB_OUTPUT ;;
        macOS)  echo "bin=quantum-cli-darwin-${ARCH}" >> $GITHUB_OUTPUT ;;
        Windows) echo "bin=quantum-cli-windows-${ARCH}.exe" >> $GITHUB_OUTPUT ;;
      esac
    shell: bash

  - name: download checksums
    env:
      DOWNLOAD_URL: ${{ inputs.download-url }}
      CLI_VERSION: ${{ steps.get_version.outputs.cli-version }}
      ACTION_PATH: ${{ github.action_path }}
    run: |
      curl -s "${DOWNLOAD_URL}/${CLI_VERSION}/checksums.txt" \
        -o "${ACTION_PATH}/checksums.txt"
    shell: bash

  - name: download quantum-cli
    env:
      DOWNLOAD_URL: ${{ inputs.download-url }}
      CLI_VERSION: ${{ steps.get_version.outputs.cli-version }}
      CLI_BIN: ${{ steps.cli.outputs.bin }}
      ACTION_PATH: ${{ github.action_path }}
    run: |
      curl -s "${DOWNLOAD_URL}/${CLI_VERSION}/${CLI_BIN}" \
        -o "${ACTION_PATH}/${CLI_BIN}"
    shell: bash

  - name: verify checksum
    env:
      CLI_BIN: ${{ steps.cli.outputs.bin }}
      ACTION_PATH: ${{ github.action_path }}
    run: |
      cd "${ACTION_PATH}"
      grep "${CLI_BIN}" checksums.txt | sha256sum -c -
      echo "Checksum verified 🛡️" >> $GITHUB_STEP_SUMMARY
    shell: bash

  - name: install quantum-cli (Linux/macOS)
    if: runner.os != 'Windows'
    env:
      CLI_BIN: ${{ steps.cli.outputs.bin }}
      ACTION_PATH: ${{ github.action_path }}
    run: install -m 755 "${ACTION_PATH}/${CLI_BIN}" "${ACTION_PATH}/quantum-cli"
    shell: bash

  - name: install quantum-cli (Windows)
    if: runner.os == 'Windows'
    env:
      CLI_BIN: ${{ steps.cli.outputs.bin }}
      ACTION_PATH: ${{ github.action_path }}
    run: install -m 755 "${ACTION_PATH}/${CLI_BIN}" "${ACTION_PATH}/quantum-cli.exe"
    shell: bash

  - name: add to path
    env:
      ACTION_PATH: ${{ github.action_path }}
    run: echo "${ACTION_PATH}" >> $GITHUB_PATH
    shell: bash

  - name: verify installation (Linux/macOS)
    if: runner.os != 'Windows'
    run: quantum-cli -v
    shell: bash

  - name: verify installation (Windows)
    if: runner.os == 'Windows'
    run: quantum-cli.exe -v
    shell: pwsh

  - name: quantum endpoint cache
    if: inputs.enable-cache == 'true'
    uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
    with:
      path: ~/.cache/quantum
      key: quantum-cache-${{ runner.os }}-${{ runner.arch }}

  - name: set credentials (api-key)
    env:
      API_KEY: ${{ inputs.api-key }}
    if: inputs.api-key != ''
    run: echo "QUANTUM_API_KEY=${API_KEY}" >> "$GITHUB_ENV"
    shell: bash
